server {
    listen 80;
    server_name is-info330.ischool.uw.edu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name is-info330.ischool.uw.edu;

    ssl_certificate     /etc/ssl/certs/is-info330.ischool.uw.edu-fullchain.pem;
    ssl_certificate_key /etc/ssl/private/is-info330.ischool.uw.edu-privkey.pem;

    # (Optional, modern defaults)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}