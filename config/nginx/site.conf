# /etc/nginx/sites-available/is-info330.ischool.uw.edu 

server {
    listen 80;
    server_name is-info330.ischool.uw.edu
                a.is-info330.ischool.uw.edu
                b.is-info330.ischool.uw.edu
                c.is-info330.ischool.uw.edu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name is-info330.ischool.uw.edu;

    include /etc/nginx/snippets/info330-ssl.conf;

    location / {
        proxy_pass http://localhost:3000;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}

server {
    listen 443 ssl http2;
    server_name a.is-info330.ischool.uw.edu;

    include /etc/nginx/snippets/info330-ssl.conf;

    location / {
        proxy_pass http://localhost:3001;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}

server {
    listen 443 ssl http2;
    server_name b.is-info330.ischool.uw.edu;

    include /etc/nginx/snippets/info330-ssl.conf;

    location / {
        proxy_pass http://localhost:3002;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}

server {
    listen 443 ssl http2;
    server_name c.is-info330.ischool.uw.edu;

    include /etc/nginx/snippets/info330-ssl.conf;

    location / {
        proxy_pass http://localhost:3003;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}

# Optional: Jupyter on :8443 for main domain only
server {
    listen 8443 ssl;
    server_name is-info330.ischool.uw.edu;

    include /etc/nginx/snippets/info330-ssl.conf;

    location / {
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-jupyter.conf;
    }
}