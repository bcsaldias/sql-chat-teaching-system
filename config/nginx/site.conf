server {
    listen 80;
    server_name is-info330.ischool.uw.edu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name is-info330.ischool.uw.edu;

    ssl_certificate     /etc/ssl/certs/is-info330.ischool.uw.edu-fullchain.pem;
    ssl_certificate_key /etc/ssl/private/is-info330.ischool.uw.edu-privkey.pem;

    # (Optional, modern defaults)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }
}

# if installing https://tljh.jupyter.org/en/latest/install/custom-server.html
server {
    listen 8443 ssl;
    server_name is-info330.ischool.uw.edu;

    ssl_certificate     /etc/ssl/certs/is-info330.ischool.uw.edu-fullchain.pem;
    ssl_certificate_key /etc/ssl/private/is-info330.ischool.uw.edu-privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
    }
}
